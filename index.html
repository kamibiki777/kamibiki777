<!DOCTYPE html>
<html>
<head>
  <title>チャット</title>
</head>
<body>

<h1>チャット</h1>

<div id="chat" style="
  border:1px solid black;
  height:300px;
  overflow:auto;
  padding:10px;
"></div>

<input type="text" id="msg" placeholder="メッセージ入力">
<button onclick="send()">送信</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyClWhZL717EP_kpsBM30exWElbMRAN0-fk",
  authDomain: "test-59d30.firebaseapp.com",
  databaseURL: "ここにdatabaseURL入れる",
  projectId: "test-59d30",
  storageBucket: "test-59d30.firebasestorage.app",
  messagingSenderId: "624393225042",
  appId: "1:624393225042:web:2f03bb5f570dc9be27b08b",
  measurementId: "G-GN0SVEXH47"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function send() {
  var text = document.getElementById("msg").value;
  if (text == "") return;

  db.ref("chat").push(text);
  document.getElementById("msg").value = "";
}

db.ref("chat").on("child_added", function(data) {
  document.getElementById("chat").innerHTML += "<div>" + data.val() + "</div>";
});
</script>

</body>
</html>
