<!DOCTYPE html>
<html>
<head>
  <title>My Site</title>
  <style>
    body {
      font-size: 60px; /* ←これで全体デカくなる */
      text-align: center; /* 真ん中にする（おまけ） */
    }
  </style>
</head>
<body>
  <h1>ようこそ！</h1>
  <p>これが自分のサイトです！</p>
  <input type="text" placeholder="入力してね" style="
  font-size:60px;
  padding:30px;
  border-radius:30px;
">
  <div id="chat" style="border:1px solid black; height:200px; overflow:auto; padding:10px;"></div>

<input type="text" id="msg" placeholder="メッセージ入力">
<button onclick="send()">送信</button>

<script>
function send() {
  var text = document.getElementById("msg").value;
  if(text == "") return;

  var chat = document.getElementById("chat");
  chat.innerHTML += "<div>自分: " + text + "</div>";

  document.getElementById("msg").value = "";
  chat.scrollTop = chat.scrollHeight;
}
</script>
</body>
</html>
